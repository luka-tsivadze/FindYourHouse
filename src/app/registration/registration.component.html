<div class="bodyEl" [ngClass]="{ 'displayNone': !displayer, 'Body': displayer }">
<div class="scroll">

    <div class="form" >
        <div class="Top"><p>Welcome To <span class="find">Find</span><span class="houses">Houses</span></p> <div class="X" (click)="makeDisplayFlse()"><img src="../../assets/Imges/StaticImg/StaticIcons/x.svg" alt=""></div></div>
        <div class="LogIn"><h3>Login</h3>
        
            <a class="fb"><img src="../../assets/Imges/StaticImg/StaticIcons/icons8-facebook.svg" alt=""> <p>Log in with Facebook</p></a>
            <a class="tw"><img src="../../assets/Imges/StaticImg/StaticIcons/twitterBlack.svg" alt=""> <p> Log in with Twitter</p></a>
            <span>Or</span>
        </div>
        <main>
            <div class="btnRow">
                <div class="logInBtn btn active" [ngClass]="{'active':login}" (click)="login = true">Login</div>
                <div class="RegistrationBtn btn" [ngClass]="{'active':!login}" (click)="login = false">Register</div>
            </div>

            <!-- Registration Form -->
            <form [formGroup]="RegistrForm" (ngSubmit)="onSubmitR()" class="inputRow" [ngClass]="{'displayNone':login}">
                <label for="firstNameReg">First Name*</label>
                <input type="text" id="firstNameReg" formControlName="firstName" required>
                <div class="error" *ngIf="RegistrForm.controls['firstName'].invalid && RegistrForm.controls['firstName'].touched">
                    First Name is required.
                </div>

                <label for="lastNameReg">Last Name*</label>
                <input type="text" id="lastNameReg" formControlName="lastName" required>
                <div class="error" *ngIf="RegistrForm.controls['lastName'].invalid && RegistrForm.controls['lastName'].touched">
                    Last Name is required.
                </div>

                <label for="emailReg">Email Address*</label>
                <input type="email" id="emailReg" formControlName="email" required>
                <div class="error" *ngIf="RegistrForm.get('email')?.invalid && RegistrForm.get('email')?.touched">
                    email is required.
                </div>

                <label for="passwordReg">Password*</label>
                <input type="password" id="passwordReg" formControlName="password" required>
                <div class="error" *ngIf="RegistrForm.controls['password'].invalid && RegistrForm.controls['password'].touched">
                    Password must be at least 6 characters long.
                </div>

                <button type="submit"  name='Register' [disabled]="!RegistrForm.valid">Register</button>
            </form>

            <!-- Login Form -->
            <form [formGroup]="LoginForm" (ngSubmit)="onSubmitL()" class="inputRow" [ngClass]="{'displayNone':!login}">
                <label for="firstNameLogin">User Name or Email Address*</label>
                <input type="text" id="firstNameLogin" formControlName="firstName" required>
                <div class="error" *ngIf="LoginForm.controls['firstName'].invalid && LoginForm.controls['firstName'].touched">
                   Write Your User Name Or Email.
                </div>

                <label for="passwordLogin">Password*</label>
                <input type="password" id="passwordLogin" formControlName="password" required>
                <div class="error" *ngIf="LoginForm.controls['password'].invalid && LoginForm.controls['password'].touched">
                    Password must be at least 6 characters.
                </div>

                <button type="submit" name='Login' [disabled]="!LoginForm.valid">Login</button>
            </form>
        </main>
        <div class="bottomRow" [ngClass]="{'displayNone':!login}">
            <div class="RememberMe">
                <input type="checkbox" id="rememberMe" [formControl]="RememberMe" >
                <label for="rememberMe">Remember Me</label>
            </div>
            <a href="#" class="forgotPassword">Lost Your password?</a>
        </div>
          
       
    </div>
</div>

</div>
